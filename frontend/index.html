<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cut Protocol</title>
    <script>
      // Set the theme class before first paint to avoid a light-theme flash
      // (dark is the default when no preference has been saved yet).
      (function () {
        try {
          var m = window.localStorage.getItem("shadcut:theme");
          document.documentElement.classList.toggle("dark", m !== "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
