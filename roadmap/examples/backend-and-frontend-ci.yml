# Example sketch only — not wired into .github/workflows/ yet.
# See roadmap/10-backend-readiness-and-testing.md §2.3 for the reasoning.
#
# To activate: push this repo to GitHub, then copy this file to
# .github/workflows/ci.yml (adjust paths/names as needed once frontend
# tests actually exist per §2.2).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    # Real Postgres, not SQLite — once the Postgres migration in §1.1
    # lands, CI must run against the same engine as production. Testing
    # against SQLite when prod is Postgres is exactly the "works on one
    # data shape, breaks on the real one" pattern this whole audit is about.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cutprotocol
          POSTGRES_PASSWORD: ci_only_password
          POSTGRES_DB: cutprotocol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cutprotocol:ci_only_password@localhost:5432/cutprotocol_test
      # No ANTHROPIC_API_KEY / USDA_API_KEY on purpose — the blocking test
      # suite must not depend on live external services. If a test needs
      # one, it belongs in the nightly job below, not here.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        run: npm test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      # Uncomment once Vitest is added per roadmap §2.2:
      # - name: Run frontend tests
      #   working-directory: frontend
      #   run: npm run test

  # --- Non-blocking, scheduled: anything that hits real external services
  # (Anthropic, USDA) or the slower DB-seeded "real pool" integration
  # variant belongs here, not in the two jobs above. Sketch only — fill in
  # once those tests exist. Notify on failure; do not gate PRs on this.
  #
  # nightly:
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'schedule'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - ...
