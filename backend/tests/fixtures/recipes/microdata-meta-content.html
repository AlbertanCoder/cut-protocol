<!doctype html>
<html><head><title>Overnight Oats</title></head>
<body>
<section itemscope itemtype="https://schema.org/Recipe/">
  <meta itemprop="name" content="Overnight Oats">
  <meta itemprop="description" content="Prep it the night before, no cooking required.">
  <meta itemprop="recipeYield" content="2 servings">
  <time itemprop="totalTime" datetime="PT5M">5 minutes (plus overnight chill)</time>
  <meta itemprop="recipeCuisine" content="American">
  <div class="ingredients">
    <p itemprop="recipeIngredient">1 cup rolled oats</p>
    <p itemprop="recipeIngredient">1 cup milk</p>
    <p itemprop="recipeIngredient">1/2 cup plain yogurt</p>
    <p itemprop="recipeIngredient">1 tbsp honey</p>
    <p itemprop="recipeIngredient">1/2 cup berries</p>
  </div>
  <div itemprop="recipeInstructions">
    Combine oats, milk, yogurt, and honey in a jar.
    Top with berries and refrigerate overnight.
  </div>
</section>
</body></html>
