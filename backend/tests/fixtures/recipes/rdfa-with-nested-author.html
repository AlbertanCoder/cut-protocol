<!doctype html>
<html><head><title>Herb Roasted Potatoes</title></head>
<body>
<div vocab="https://schema.org/" typeof="Recipe">
  <span property="name">Herb Roasted Potatoes</span>
  <div property="author" typeof="Person">
    <span property="name">Not The Recipe Name</span>
  </div>
  <span property="recipeYield">4 servings</span>
  <span property="recipeCuisine">American</span>
  <div property="recipeIngredient">2 lbs baby potatoes, halved</div>
  <div property="recipeIngredient">3 tbsp olive oil</div>
  <div property="recipeIngredient">2 sprigs rosemary</div>
  <div property="recipeIngredient">1 tsp salt</div>
  <div property="recipeIngredient">1/2 tsp black pepper</div>
  <div property="recipeInstructions">Toss potatoes with oil, rosemary, salt, and pepper.</div>
  <div property="recipeInstructions">Roast at 425F for 35 minutes, tossing once.</div>
</div>
</body></html>
