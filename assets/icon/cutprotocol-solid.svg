<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    Cut Protocol app icon — SOLID (inverted) variant, used at <= 32px where
    an outline stroke would vanish. Solid athletic-green shield with the
    six-pack carved out in dark (accent-ink #05130B). Gaps are deliberately
    wider than the outline variant so every separation still lands >= 1px
    when rasterized at 16px (256/16 = 16 units per pixel).
  -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="#131715"/>

  <!-- solid shield; stroke fattens the silhouette -->
  <path d="M 62 46 H 194 Q 202 46 202 54 V 120 Q 202 158 176 182 Q 154 202 128 212 Q 102 202 80 182 Q 54 158 54 120 V 54 Q 54 46 62 46 Z"
        fill="#2FD576" stroke="#2FD576" stroke-width="6" stroke-linejoin="round"/>

  <!-- six-pack carved out of the shield -->
  <g fill="#05130B">
    <rect x="75"  y="70"  width="44" height="30" rx="8"/>
    <rect x="137" y="70"  width="44" height="30" rx="8"/>
    <rect x="75"  y="116" width="44" height="30" rx="8"/>
    <rect x="137" y="116" width="44" height="30" rx="8"/>
    <rect x="85"  y="162" width="34" height="22" rx="9"/>
    <rect x="137" y="162" width="34" height="22" rx="9"/>
  </g>
</svg>
