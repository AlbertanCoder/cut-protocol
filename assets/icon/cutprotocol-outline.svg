<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    Cut Protocol app icon — OUTLINE variant (used at >= 48px).
    Shield badge with a geometric six-pack grid. Colors are the app theme
    tokens: accent #2FD576 (athletic green) on card charcoal #131715.
    The small-size builds use cutprotocol-solid.svg (inverted) instead —
    an 11-unit outline stroke dies below ~48px.
  -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="#131715"/>
  <rect x="1.5" y="1.5" width="253" height="253" rx="56.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="3"/>

  <!-- shield outline -->
  <path d="M 62 46 H 194 Q 202 46 202 54 V 120 Q 202 158 176 182 Q 154 202 128 212 Q 102 202 80 182 Q 54 158 54 120 V 54 Q 54 46 62 46 Z"
        fill="none" stroke="#2FD576" stroke-width="11" stroke-linejoin="round"/>

  <!-- six-pack grid: 2 x 3 rounded blocks, bottom row tapered with the shield -->
  <g fill="#2FD576">
    <rect x="78"  y="74"  width="43" height="32" rx="8"/>
    <rect x="135" y="74"  width="43" height="32" rx="8"/>
    <rect x="78"  y="118" width="43" height="32" rx="8"/>
    <rect x="135" y="118" width="43" height="32" rx="8"/>
    <rect x="87"  y="160" width="34" height="22" rx="9"/>
    <rect x="135" y="160" width="34" height="22" rx="9"/>
  </g>
</svg>
