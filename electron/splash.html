<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cut Protocol</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1220;
        color: #e8ecf1;
        font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        text-align: center;
      }
      .brand {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #d4af37;
        margin-bottom: 0.75rem;
      }
      .status {
        font-size: 0.9rem;
        color: #8b93a3;
      }
      .spinner {
        margin: 0 auto 1.25rem;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(212, 175, 55, 0.25);
        border-top-color: #d4af37;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div class="brand">Cut Protocol</div>
      <div class="status">Starting up&hellip;</div>
    </div>
  </body>
</html>
