# Activated from roadmap/examples/backend-and-frontend-ci.yml.
# Adapted to match reality, not the aspirational sketch: prod/dev both run
# SQLite (see backend/prisma/schema.prisma, railway.json) — the Postgres
# migration in roadmap §1.1 hasn't landed, so this runs against SQLite until
# it does. Swap in the Postgres service block from the roadmap example when
# that migration ships.

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # Stage S security lane (keyless, dependency-free, blocking). Repo is PUBLIC.
  # S2 secret scan + S1 brain-purity guard (the brain must carry no web/shell/
  # file-write/eval capability — Laws 5/6). A finding = red = STOP.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Secret scan (S2)
        run: node scripts/scanSecrets.mjs --tracked
      - name: Brain-purity guard (S1, Laws 5/6)
        run: node scripts/checkBrainPurity.mjs
      - name: Supply-chain guard (S3)
        run: node scripts/checkSupplyChain.mjs
      - name: npm audit (S3, advisory)
        run: |
          (cd backend && npm audit --audit-level=high) || true
          (cd frontend && npm audit --audit-level=high) || true

  backend:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./ci.db
      JWT_SECRET: ci-only-not-a-real-secret
      SEED_EMAIL: ci@example.com
      SEED_PASSWORD: ci-only-not-a-real-secret
      # No ANTHROPIC_API_KEY / USDA_API_KEY on purpose — the blocking test
      # suite must not depend on live external services.

    steps:
      - uses: actions/checkout@v4

      # Node 24, not 20. The migration runner (src/lib/desktopBootstrap.js) and
      # its tests use the core `node:sqlite` module, which does not exist on
      # Node 20 and is flag-free only from Node 22.13/24 onward. On Node 20
      # `require("node:sqlite")` threw at import, silently taking out
      # migrationRunner.test.js and auth.registration.test.js — which the old
      # broken `**` glob had never run on CI in the first place, so the gap only
      # became visible once tests-quality-1 made every file actually run. 24
      # matches the local dev runtime and the Node bundled by Electron 43.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      # recipeGeneration.test.js asserts real Food rows exist in the DB
      # (it borrows them read-only) — same seed steps as README setup.
      - name: Seed
        working-directory: backend
        run: |
          npm run seed
          npm run seed:recipes

      # Guard the guard (fleet finding tests-quality-1). Every tripwire in
      # backend/scripts/runTests.mjs is only reachable while `npm test` still
      # routes through it. The bug that started this — `node --test
      # tests/**/*.test.js`, which bash silently collapsed to a single `*` and
      # skipped 27 of 62 files including the P0 allergen sweep — cost nothing to
      # write and was invisible once written. If anyone reintroduces a shell glob
      # here, fail loudly instead of quietly certifying a fraction of the suite.
      #
      # Deliberately inline and deliberately OUTSIDE `npm test`: a guard that
      # runs via the thing it is guarding cannot catch that thing being bypassed.
      - name: Test entrypoint guard
        working-directory: backend
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const s = JSON.parse(readFileSync("package.json", "utf8")).scripts.test || "";
            const problems = [];
            if (!s.includes("scripts/runTests.mjs")) problems.push("it no longer routes through scripts/runTests.mjs (the file that owns discovery + the MIN_TEST_FILES / MIN_TESTS tripwires)");
            if (s.includes("*")) problems.push("it contains a shell glob; discovery must happen in JS, never in a shell");
            if (problems.length) {
              console.error("CI FAIL - the backend test entrypoint regressed.");
              console.error("  scripts.test = " + JSON.stringify(s));
              for (const p of problems) console.error("  - " + p);
              process.exit(1);
            }
            console.log("test entrypoint OK - " + JSON.stringify(s));
          '

      - name: Run backend tests
        working-directory: backend
        run: npm test

      # QC gauntlet regression gate: the Monte-Carlo P0 bar (0 allergy leaks,
      # 0 floor breaches, 0 macro drift, 0 crashes, 0 network calls). The qc
      # unit tests (allergen matcher, floor dominance, determinism, SSRF,
      # importer/auth fuzz) already run in `npm test` above; this adds the
      # seeded 1k simulation on top. --assert exits non-zero on any P0.
      - name: QC Monte-Carlo smoke (P0 gate)
        working-directory: backend
        run: npm run qc:smoke

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # npm install, not npm ci: package-lock.json was generated on Windows
      # and never recorded the Linux-only @emnapi/* optional deps Rollup's
      # WASM fallback pulls in, so `npm ci` fails on the ubuntu runner with
      # "Missing @emnapi/core from lock file" even though nothing is
      # actually broken. `npm install` resolves them at install time instead
      # of requiring the lockfile to already have every platform's entries.
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
